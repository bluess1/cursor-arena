<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cursor Games — Vote</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      width:100vw;height:100vh;overflow:hidden;
      background:#0a0a0f;font-family:'Courier New',monospace;
      color:white;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:0;
      user-select:none;
    }

    /* ── Join overlay ── */
    #join{
      position:fixed;inset:0;background:#0a0a0f;z-index:99;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    }
    #join h1{font-size:26px;letter-spacing:3px;color:#999;}
    #join p{font-size:12px;color:#444;letter-spacing:1px;}
    #join input{
      background:#111118;border:1px solid #222230;color:white;
      padding:9px 16px;border-radius:6px;font-size:15px;
      outline:none;width:210px;text-align:center;font-family:inherit;
    }
    #join input:focus{border-color:#333348;}
    #join button{
      background:#18182a;color:#777;border:1px solid #252538;
      padding:9px 28px;border-radius:6px;font-size:13px;
      cursor:pointer;font-family:inherit;letter-spacing:1.5px;
    }
    #join button:hover{background:#202035;color:#aaa;}

    /* ── Main voting UI ── */
    #main{display:none;flex-direction:column;align-items:center;gap:28px;width:100%;max-width:500px;padding:0 24px;}
    #main.show{display:flex;}

    .section-label{font-size:10px;color:#333;letter-spacing:2.5px;text-transform:uppercase;}

    /* Header */
    #header{text-align:center;}
    #header h2{font-size:22px;letter-spacing:2px;color:#888;}
    #header .sub{font-size:12px;color:#444;margin-top:6px;letter-spacing:0.5px;}

    /* Timer bar */
    #timer-wrap{width:100%;position:relative;}
    #timer-bar-bg{width:100%;height:3px;background:#151520;border-radius:2px;}
    #timer-bar{height:3px;background:#444;border-radius:2px;transition:width 0.5s linear;width:100%;}
    #timer-txt{font-size:11px;color:#444;text-align:center;margin-top:5px;letter-spacing:1px;}

    /* Vote cards */
    #vote-cards{display:flex;gap:14px;width:100%;}
    .vote-card{
      flex:1;padding:20px 16px;border-radius:10px;
      background:#111118;border:2px solid #1e1e2e;
      cursor:pointer;text-align:center;
      transition:border-color 0.15s,background 0.15s,transform 0.1s;
      position:relative;
    }
    .vote-card:hover{background:#151522;transform:translateY(-2px);}
    .vote-card.selected{border-color:var(--c);background:#13131f;}
    .vote-card.selected .card-name{color:var(--c);}
    .vote-card .card-icon{font-size:28px;margin-bottom:8px;}
    .vote-card .card-name{font-size:14px;letter-spacing:1.5px;color:#888;font-weight:700;}
    .vote-card .card-desc{font-size:11px;color:#444;margin-top:6px;line-height:1.5;}
    .vote-card .vote-count{
      position:absolute;top:8px;right:10px;
      font-size:11px;color:#555;letter-spacing:0.5px;
    }
    .vote-card.winning .vote-count{color:var(--c);}

    /* Result */
    #result{display:none;flex-direction:column;align-items:center;gap:10px;text-align:center;}
    #result.show{display:flex;}
    #result .res-label{font-size:11px;color:#444;letter-spacing:2px;}
    #result .res-name{font-size:32px;font-weight:700;letter-spacing:2px;}
    #result .res-sub{font-size:13px;color:#555;}
    #result .res-countdown{font-size:11px;color:#333;margin-top:8px;letter-spacing:1.5px;}

    /* Player list */
    #players-wrap{width:100%;}
    #player-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .player-chip{
      display:flex;align-items:center;gap:5px;
      padding:3px 9px;border-radius:10px;
      background:#111118;border:1px solid #1e1e2e;font-size:11px;color:#666;
    }
    .player-dot{width:6px;height:6px;border-radius:50%;}

    /* Previous round result */
    #prev-result{
      font-size:12px;color:#444;letter-spacing:0.5px;text-align:center;
      min-height:18px;
    }
  </style>
</head>
<body>

<div id="join">
  <h1>CURSOR GAMES</h1>
  <p>minigames · multiplayer · mayhem</p>
  <input id="name-input" maxlength="16" placeholder="your name"/>
  <button onclick="joinLobby()">Enter →</button>
</div>

<div id="main">
  <div id="header">
    <div class="section-label">vote for next game</div>
    <div id="prev-result"></div>
  </div>

  <div id="timer-wrap">
    <div id="timer-bar-bg"><div id="timer-bar"></div></div>
    <div id="timer-txt">10s</div>
  </div>

  <div id="vote-cards">
    <div class="vote-card" id="card-laser" style="--c:#e74c3c" onclick="castVote('laser')">
      <div class="vote-count" id="count-laser">0</div>
      <div class="card-icon">⚡</div>
      <div class="card-name">LASER DODGE</div>
      <div class="card-desc">Dodge the lasers.<br>Last cursor standing wins.</div>
    </div>
    <div class="vote-card" id="card-mansion" style="--c:#c8a040" onclick="castVote('mansion')">
      <div class="vote-count" id="count-mansion">0</div>
      <div class="card-icon">👻</div>
      <div class="card-name">MANSION MAZE</div>
      <div class="card-desc">One hunter. Everyone<br>else hides in the dark.</div>
    </div>
  </div>

  <div id="result">
    <div class="res-label">game selected</div>
    <div class="res-name" id="res-name"></div>
    <div class="res-sub" id="res-sub"></div>
    <div class="res-countdown" id="res-countdown"></div>
  </div>

  <div id="players-wrap">
    <div class="section-label">players</div>
    <div id="player-list"></div>
  </div>
</div>

<script>
const PARTYKIT_HOST = "mousegame-party.bluess1.partykit.dev";
const COLORS = ["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#1abc9c","#e67e22","#e91e63","#00bcd4","#ff5722"];
const GAME_META = {
  laser:   { name:"LASER DODGE",   icon:"⚡", url:"laser.html",   color:"#e74c3c" },
  mansion: { name:"MANSION MAZE",  icon:"👻", url:"mansion.html", color:"#c8a040" },
};

let socket, myId, myName="", myColor="";
let myVote=null, voteDuration=10000, voteStart=0;
let timerInterval=null, countdownInterval=null;
const players={};

// Grab name/color from sessionStorage if returning from a game
const stored = JSON.parse(sessionStorage.getItem('cgPlayer')||'{}');
if(stored.name) document.getElementById('name-input').value=stored.name;

function joinLobby(){
  myName  = document.getElementById('name-input').value.trim()||'Player';
  myColor = stored.color||COLORS[Math.floor(Math.random()*COLORS.length)];
  sessionStorage.setItem('cgPlayer', JSON.stringify({name:myName,color:myColor}));
  document.getElementById('join').style.display='none';
  document.getElementById('main').classList.add('show');
  connect();
}
document.getElementById('name-input').addEventListener('keydown',e=>{ if(e.key==='Enter') joinLobby(); });

// If returning from a game (sessionStorage has name), auto-join
if(stored.name && stored.autoJoin){
  sessionStorage.setItem('cgPlayer', JSON.stringify({...stored, autoJoin:false}));
  window.addEventListener('load', ()=>{
    myName=stored.name; myColor=stored.color;
    document.getElementById('join').style.display='none';
    document.getElementById('main').classList.add('show');
    connect();
  });
}

function connect(){
  const proto = PARTYKIT_HOST.startsWith('localhost')?'ws':'wss';
  socket = new WebSocket(`${proto}://${PARTYKIT_HOST}/parties/main/arena`);
  socket.onopen=()=>{ socket.send(JSON.stringify({type:'hello',name:myName,color:myColor})); };
  socket.onmessage=e=>{ handle(JSON.parse(e.data)); };
  socket.onclose=()=>setTimeout(connect,2000);
}

function handle(msg){
  if(msg.type==='init'){
    myId=msg.id;
    for(const[id,p]of Object.entries(msg.players)) players[id]=p;
    updatePlayerList();
    if(msg.phase==='voting'){
      // We joined mid-vote — show voting UI, estimate remaining time
      showVoting(msg.duration||voteDuration);
    }
    if(msg.phase==='playing'){
      // Game already running — go straight there
      redirectTo(msg.currentGame);
    }
  }

  if(msg.type==='player_join'){ players[msg.id]=msg.player; updatePlayerList(); }
  if(msg.type==='leave'){ delete players[msg.id]; updatePlayerList(); }

  if(msg.type==='voting_start'){
    myVote=null;
    document.getElementById('card-laser').classList.remove('selected','winning');
    document.getElementById('card-mansion').classList.remove('selected','winning');
    document.getElementById('result').classList.remove('show');
    document.getElementById('vote-cards').style.display='flex';
    showVoting(msg.duration);
  }

  if(msg.type==='vote_update'){
    updateVoteCounts(msg.counts, msg.total);
  }

  if(msg.type==='round_end'){
    // Show who won while we wait for voting_start
    const meta=GAME_META[msg.game]||{};
    let txt='';
    if(msg.winnerRole==='hunter') txt=`${msg.winnerName} caught everyone — hunter wins`;
    else if(msg.winnerRole==='survivor') txt=`${msg.winnerName} survived the lasers`;
    else txt=`${msg.winnerName} wins`;
    document.getElementById('prev-result').textContent=txt;
  }

  if(msg.type==='vote_result'){
    showResult(msg.winner, msg.counts);
  }

  if(msg.type==='round_start'){
    redirectTo(msg.game);
  }
}

function castVote(game){
  if(myVote) return; // can't change vote
  myVote=game;
  document.getElementById(`card-${game}`).classList.add('selected');
  if(socket?.readyState===WebSocket.OPEN){
    socket.send(JSON.stringify({type:'vote',game}));
  }
}

function showVoting(duration){
  voteDuration=duration; voteStart=Date.now();
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    const elapsed=Date.now()-voteStart;
    const rem=Math.max(0,duration-elapsed);
    const pct=(rem/duration)*100;
    document.getElementById('timer-bar').style.width=pct+'%';
    document.getElementById('timer-txt').textContent=Math.ceil(rem/1000)+'s';
    if(rem===0) clearInterval(timerInterval);
  },100);
}

function updateVoteCounts(counts,total){
  const laser=counts.laser||0, mansion=counts.mansion||0;
  document.getElementById('count-laser').textContent=laser;
  document.getElementById('count-mansion').textContent=mansion;
  document.getElementById('card-laser').classList.toggle('winning',laser>mansion);
  document.getElementById('card-mansion').classList.toggle('winning',mansion>laser);
}

function showResult(winner,counts){
  clearInterval(timerInterval);
  document.getElementById('timer-bar').style.width='0%';
  document.getElementById('vote-cards').style.display='none';

  const meta=GAME_META[winner];
  document.getElementById('res-name').textContent=meta.icon+' '+meta.name;
  document.getElementById('res-name').style.color=meta.color;
  document.getElementById('res-sub').textContent=
    `laser:${counts.laser||0}  mansion:${counts.mansion||0}`;
  document.getElementById('result').classList.add('show');

  // Countdown to redirect
  let t=3;
  document.getElementById('res-countdown').textContent=`launching in ${t}s`;
  clearInterval(countdownInterval);
  countdownInterval=setInterval(()=>{
    t--;
    document.getElementById('res-countdown').textContent=t>0?`launching in ${t}s`:'launching…';
    if(t<=0) clearInterval(countdownInterval);
  },1000);
}

function redirectTo(game){
  const meta=GAME_META[game];
  if(!meta) return;
  // Save player info so the game page knows who we are
  sessionStorage.setItem('cgPlayer', JSON.stringify({name:myName,color:myColor,autoJoin:true}));
  window.location.href=meta.url;
}

function updatePlayerList(){
  const el=document.getElementById('player-list');
  el.innerHTML=Object.values(players).map(p=>`
    <div class="player-chip">
      <div class="player-dot" style="background:${p.color||'#888'}"></div>
      <span>${p.name||'?'}</span>
    </div>`).join('');
}
</script>
</body>
</html>
